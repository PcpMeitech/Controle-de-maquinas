function bcS(v,w=260,h=30){const bars=c128(v),bw=w/bars.length;let r="";for(let i=0;i<bars.length;i++)if(bars[i]==="1")r+=`<rect x="${i*bw}" y="0" width="${bw+.5}" height="${h}" fill="#000"/>`;return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${r}</svg>`;}

function Badge({children,color}){const c={blue:"bg-blue-100 text-blue-800",green:"bg-green-100 text-green-800",yellow:"bg-yellow-100 text-yellow-800",red:"bg-red-100 text-red-800",purple:"bg-purple-100 text-purple-800",gray:"bg-gray-100 text-gray-800",orange:"bg-orange-100 text-orange-800"};return (<span className={`px-2 py-0.5 rounded-full text-xs font-medium ${c[color]||c.gray}`}>{children}</span>);}
function dC(d){return{SOLDA:"red",USINAGEM:"blue",MONTAGEM:"purple",CORTE:"orange",PINTURA:"green"}[d]||"gray";}

function procToDest(procName){
  if(!procName)return"";const p=procName.toUpperCase();
  if(p.includes("CORTE"))return"CORTE";
  if(p.includes("TORNO")||p.includes("FRESA")||p.includes("PLAINA")||p.includes("CHAVETEIRA")||p.includes("RETÍFICA")||p.includes("ROSQUEADEIRA")||p.includes("GERADORA"))return"USINAGEM";
  if(p.includes("SOLDA"))return"SOLDA";if(p.includes("MONTAGEM"))return"MONTAGEM";
  if(p.includes("ACABAMENTO")||p.includes("PINTURA"))return"PINTURA";
  if(p.includes("REQUISIÇÃO")||p.includes("ALMOXARIFADO"))return"ALMOXARIFADO";
  if(p.includes("CROMAGEM")||p.includes("ANODIZAR")||p.includes("TÊMPERA")||p.includes("GALVANIZAÇÃO"))return"TERCEIRO";
  return"USINAGEM";}

// ─── HTML → texto ────────────────────────────────────────────────────────────
function htmlToText(htmlStr){
  try{
    const parser=new DOMParser();
    const doc=parser.parseFromString(htmlStr,"text/html");
    doc.querySelectorAll("script,style").forEach(el=>el.remove());
    const BLOCKS=new Set(["DIV","TR","P","BR","LI","TD","TH","H1","H2","H3","H4","H5","H6","SECTION","TABLE","THEAD","TBODY","HEADER","FOOTER"]);
    const parts=[];
    function walk(node){
      if(node.nodeType===Node.TEXT_NODE){const t=node.textContent;if(t.trim())parts.push(t.trim());}
      else if(node.nodeType===Node.ELEMENT_NODE){
        if(BLOCKS.has(node.tagName)&&parts.length&&parts[parts.length-1]!=="")parts.push("");
        node.childNodes.forEach(walk);
        if(BLOCKS.has(node.tagName))parts.push("");
      }
    }
    walk(doc.body||doc.documentElement);
    // Colapsa linhas vazias consecutivas
    return parts.filter((l,i)=>l||parts[i-1]).join("\n");
  }catch{return htmlStr.replace(/<[^>]+>/g," ");}
}

// ─── Parser de texto (igual ao original parsePdf, renomeado) ─────────────────
function parseText(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  let pedido="",cliente="",maquina="";
  for(let i=0;i<lines.length;i++){
    if(!/PEDIDO/i.test(lines[i]))continue;
    const sm=lines[i].match(/PEDIDO\s*[:\-\s]+(\d{4,6})\b/i);
    if(sm){pedido=sm[1];break;}
    for(let j=i+1;j<Math.min(i+5,lines.length);j++){
      const t=lines[j].trim();
      if(/^\d{4,6}$/.test(t)){pedido=t;break;}
      const m2=t.match(/^(\d{4,6})\b/);if(m2&&!/\//.test(t)){pedido=m2[1];break;}
    }
    if(pedido)break;
  }
  for(let i=0;i<lines.length;i++){
    if(!/CLIENTE/i.test(lines[i]))continue;
    const cm=lines[i].match(/CLIENTE\s*[:\-\s]+([A-Za-zÀ-ú][\w\sÀ-ú\-\.&,\/]{2,})/i);
    if(cm){const c=cm[1].trim();if(!/DOCUMENTO|ELABORAD|DATA|REVIS|PEDIDO|STATUS|CÓDIGO|QUANT/i.test(c)&&c.length>2){cliente=c;break;}}
    for(let j=i+1;j<Math.min(i+6,lines.length);j++){
      const t=lines[j].trim();if(!t||t.length<2)continue;
      if(/^\d{2}\/\d{2}/.test(t))continue;if(/^\d+$/.test(t))continue;
      if(/DOCUMENTO|ELABORAD|DATA|REVIS|PEDIDO|STATUS|CÓDIGO|QUANT|FOLHA/i.test(t))continue;
      if(/^[A-Z]{2,4}\d{4,5}/.test(t))continue;
      if(/[A-Za-zÀ-ú]/.test(t)){cliente=t;break;}
    }
    break;
  }
  for(let i=lines.length-1;i>=Math.max(0,lines.length-30);i--){
    if(/\b[A-Z]{3}\d{5}\b/.test(lines[i])&&/[-–]/.test(lines[i])){maquina=lines[i].trim();break;}}
  const cRe=/\b([A-Z]{2,4}\d{4,5})(?:-\d{1,2})?\b/g;
  const skipL=/^(DOCUMENTO|ELABORAD|DATA\b|REVIS|CÓDIGO\s|ITEM\s+QTD|PEDIDO|CLIENTE|QUANT|STATUS|TOTAL|OBS|DESCRI|PROCESSO|Nº\s|FOLHA|MATERIAL|PESO|UNID|TRATAMENTO)/i;
  const skipC=/^(DATA|PEDI|QUAN|TOTA|REVI|DESC|PROC|STAT|ELAB|FOLH|INOX|MATE|ITEM|PESO|UNID|AISI|ABNT|TRAT|ACAB|CONF|FORM)/i;
  const items=[];
  for(let i=0;i<lines.length;i++){
    if(skipL.test(lines[i].trim())||/DOCUMENTO|ELABORADOR|REVIS[ÃA]O/i.test(lines[i]))continue;
    let m;cRe.lastIndex=0;
    while((m=cRe.exec(lines[i]))!==null){
      const bc=m[1];if(bc.length<7||skipC.test(bc))continue;
      // Tenta pegar qty na mesma linha (após o código)
      let qty=1;
      const sameLine=lines[i].slice(m.index+m[0].length).trim().match(/\b(\d{1,3})\b/g);
      if(sameLine)for(const n of sameLine){const v=parseInt(n);if(v>0&&v<500){qty=v;break;}}
      // Se não achou na mesma linha, olha as próximas 3 linhas (células HTML separadas)
      // IMPORTANTE: usa regex sem /g para não afetar o lastIndex do loop externo cRe
      if(qty===1){
        const codeCheck=/\b[A-Z]{2,4}\d{4,5}\b/;
        for(let k=i+1;k<Math.min(i+8,lines.length)&&qty===1;k++){
          const nl=lines[k].trim();
          if(codeCheck.test(nl)||skipL.test(nl))break;
          const nm=nl.match(/^\s*(\d{1,3})\s*$/);
          if(nm){const v=parseInt(nm[1]);if(v>0&&v<500){qty=v;}}
        }
      }
      const np=bc.replace(/^[A-Z]+/,"");
      let dest;
      if(/^\d/.test(bc))dest="ALMOXARIFADO";
      else if(np.startsWith("2"))dest="MONTAGEM";
      else{const procs=getProcs(bc);dest=procs.length?procToDest(procs[0].name):"";}
      items.push({code:bc,qty,destino:dest,filhos:[]});
    }
  }
  // Filhos: itens abaixo de um MONTAGEM (num. começa com "2") são seus componentes
  let parentIdx=-1;
  for(let i=0;i<items.length;i++){
    const np=items[i].code.replace(/^[A-Z]+/,"");
    if(np.startsWith("2")){parentIdx=i;}
    else if(parentIdx>=0){items[parentIdx].filhos.push({code:items[i].code,qty:items[i].qty});}
  }
  return{pedido,cliente,maquina,items};
}

function drawUrl(code){return`http://pdf.meitech.com.br:9000/file/${(code||"").replace(/-\d+$/,"")}.pdf`;}
function PrintDrawBtn({code}){const url=drawUrl(code);const doPrint=()=>{const w=window.open(url);if(w)setTimeout(()=>{try{w.focus();w.print();}catch{}},1500);};return(<button onClick={doPrint} className="px-1.5 py-0.5 text-xs bg-gray-100 hover:bg-gray-200 rounded" title="Imprimir desenho">🖨️📄</button>);}

function saveTime(code,procName,duration,operator){
  FB.pushTime({code,proc:procName,dur:duration,op:operator||"",date:new Date().toLocaleString("pt-BR"),ts:Date.now()});
}

function getTimes(){return window.__times||[];}
function fmtDur(ms){if(!ms)return"—";const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);if(h>0)return`${h}h${String(m%60).padStart(2,"0")}m`;if(m>0)return`${m}m${String(s%60).padStart(2,"0")}s`;return`${s}s`;}

function ScanScreen({ordens,onUpdate}){
  const[si,setSi]=useState("");const[so,setSo]=useState(null);const[obs,setObs]=useState("");const[fb,setFb]=useState(null);const[lock,setLock]=useState(false);const[oper,setOper]=useState(()=>LS.get("op-last-oper",""));const ir=useRef();const lr=useRef({c:"",t:0});
  useEffect(()=>{ir.current?.focus();},[]);
  useEffect(()=>{if(so){const u=ordens.find(o=>o.controle===so.controle);if(u)setSo(u);}},[ordens]);
  useEffect(()=>{LS.set("op-last-oper",oper);},[oper]);
  const scan=val=>{
    const v=val.trim();if(!v)return;
    const now=Date.now();
    if(lr.current.c===v&&now-lr.current.t<1500){setFb({t:"warn",m:"⚠️ Duplo ignorado"});beep("err");return;}
    lr.current={c:v,t:now};
    const mp=v.match(/^OP-(\d+)-P(\d+)$/),mo=v.match(/^OP-(\d+)$/);
    if(mp){
      const ctrl=parseInt(mp[1]),pn=parseInt(mp[2]);
      const found=ordens.find(o=>o.controle===ctrl);
      if(!found){setFb({t:"error",m:`Ordem ${ctrl} não encontrada.`});setSo(null);beep("err");return;}
      setSo(found);setObs("");
      const procs=[...(found.processos||[])];const p=procs[pn-1];
      if(!p){setFb({t:"error",m:`P${pn} inválido.`});beep("err");return;}
      if(p.done){setFb({t:"warn",m:`P${pn} já concluído.`});beep("err");return;}

      if(!p.started){
        // REGRA 1: não pode iniciar se há processo anterior não concluído nesta ordem
        const anterior=procs.slice(0,pn-1).find(x=>!x.done);
        if(anterior){
          setFb({t:"error",m:`❌ Finalize primeiro: "${anterior.name}" antes de iniciar "${p.name}".`});
          beep("err");return;
        }
        // REGRA 2: não pode ter dois processos em andamento na mesma ordem
        const outroProcAberto=procs.find(x=>x.started&&!x.done);
        if(outroProcAberto){
          setFb({t:"error",m:`❌ Processo "${outroProcAberto.name}" já em andamento nesta ordem. Finalize-o antes de iniciar outro.`});
          beep("err");return;
        }
        procs[pn-1]={...p,started:true,startAt:new Date().toLocaleString("pt-BR"),startTs:Date.now(),operator:oper};
        onUpdate({...found,processos:procs});
        setFb({t:"start",m:`▶ P${pn} "${p.name}" INICIADO${oper?` — Op: ${oper}`:""}`});beep("start");
      } else {
        const dur=p.startTs?Date.now()-p.startTs:0;
        procs[pn-1]={...p,done:true,doneAt:new Date().toLocaleString("pt-BR"),doneTs:Date.now(),duration:dur,operator:oper||p.operator,obs:obs||""};
        saveTime(found.codigo,p.name,dur,oper||p.operator||"");
        const allD=procs.every(x=>x.done);
        const upd={...found,processos:procs};
        if(allD){upd.dataBaixa=new Date().toLocaleDateString("pt-BR");upd.baixa="X";}
        onUpdate(upd);
        setFb({t:"success",m:`✓ P${pn} "${p.name}" CONCLUÍDO em ${fmtDur(dur)}${allD?" — ORDEM FINALIZADA!":""}`});
        beep(allD?"done":"ok");setObs("");
      }
      return;
    }
    if(mo){const ctrl=parseInt(mo[1]);const found=ordens.find(o=>o.controle===ctrl);if(!found){setFb({t:"error",m:`Ordem ${ctrl} não encontrada.`});setSo(null);beep("err");return;}setSo(found);setObs("");setFb(null);beep("ok");return;}
    setFb({t:"error",m:`"${v}" não reconhecido.`});setSo(null);beep("err");};
  const kd=e=>{if(e.key==="Enter"){scan(si);setSi("");}};
  const ci=so?(so.processos||[]).findIndex(p=>!p.done):-1;
  const baixa=()=>{if(!so||lock)return;setLock(true);const procs=[...(so.processos||[])];const idx=procs.findIndex(p=>!p.done);if(idx===-1){setFb({t:"warn",m:"Todos concluídos!"});setLock(false);return;}
    const p=procs[idx];const dur=p.startTs?Date.now()-p.startTs:0;
    procs[idx]={...p,started:true,done:true,startAt:p.startAt||new Date().toLocaleString("pt-BR"),doneAt:new Date().toLocaleString("pt-BR"),doneTs:Date.now(),duration:dur,operator:oper||p.operator||"",obs:obs||""};
    saveTime(so.codigo,p.name,dur,oper||p.operator||"");
    const allD=procs.every(x=>x.done);const upd={...so,processos:procs};if(allD){upd.dataBaixa=new Date().toLocaleDateString("pt-BR");upd.baixa="X";}
    onUpdate(upd);setFb({t:"success",m:`✓ "${p.name}" concluído${dur?` em ${fmtDur(dur)}`:""}${allD?" — FINALIZADA!":""}`});beep(allD?"done":"ok");setObs("");setTimeout(()=>{setLock(false);ir.current?.focus();},500);};
  return(<div className="space-y-4">
    <div className="bg-white rounded-xl border-2 border-blue-300 shadow-lg p-4">
      <div className="flex items-center gap-3 mb-2"><span className="text-2xl">📡</span><h2 className="text-lg font-bold">Bipagem</h2></div>
      <div className="flex gap-2 mb-2"><input value={oper} onChange={e=>setOper(e.target.value)} className="w-48 px-3 py-2 border rounded-lg text-sm" placeholder="👤 Operador"/><span className="text-xs text-gray-400 self-center">Bipe 1x=Iniciar, 2x=Finalizar</span></div>
      <input ref={ir} value={si} onChange={e=>setSi(e.target.value)} onKeyDown={kd} className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg font-mono focus:ring-2 focus:ring-blue-500" placeholder="OP-XXXXX ou OP-XXXXX-PN" autoFocus/>
    </div>
    {fb&&<div className={`rounded-xl p-3 font-medium text-sm ${fb.t==="error"?"bg-red-50 text-red-700 border border-red-200":fb.t==="warn"?"bg-yellow-50 text-yellow-700 border border-yellow-200":fb.t==="start"?"bg-blue-50 text-blue-700 border border-blue-200":"bg-green-50 text-green-700 border border-green-200"}`}>{fb.m}</div>}
    {so&&<div className="bg-white rounded-xl border shadow-sm overflow-hidden">
      <div className="p-3 bg-blue-50 border-b"><div className="flex justify-between"><div><span className="text-lg font-bold text-blue-900">Ctrl: {so.controle}</span><span className="ml-3 text-sm text-blue-700">{so.codigo} · Qt:{so.qtde} · Pri:{so.prioridade||"—"}</span><br/><span className="text-sm text-blue-600">{so.atender} · {so.maquina}</span></div><div className="flex flex-col items-end gap-1"><Badge color={dC(so.destino)}>{so.destino}</Badge><PrintDrawBtn code={so.codigo}/></div></div></div>
      <div className="p-3"><div className="space-y-1.5">{(so.processos||[]).map((p,i)=>(<div key={i} className={`flex items-center gap-2 p-2 rounded-lg border-2 text-sm ${p.done?"bg-green-50 border-green-300":p.started?"bg-blue-50 border-blue-300":i===ci?"bg-yellow-50 border-yellow-400":"bg-gray-50 border-gray-200"}`}>
        <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${p.done?"bg-green-500 text-white":p.started?"bg-blue-500 text-white":i===ci?"bg-yellow-500 text-white":"bg-gray-300"}`}>{p.done?"✓":p.started?"▶":i+1}</div>
        <div className="flex-1"><span className={`font-medium ${p.done?"text-green-700 line-through":p.started?"text-blue-700":""}`}>{p.name}</span>
          {p.started&&!p.done&&<span className="text-xs text-blue-600 ml-2">⏱ Iniciado {p.startAt}{p.operator?` · ${p.operator}`:""}</span>}
          {p.done&&<span className="text-xs text-green-600 ml-2">✓ {p.doneAt} · {fmtDur(p.duration)}{p.operator?` · ${p.operator}`:""}</span>}
        </div>
        {i===ci&&!p.started&&<span className="text-xs font-bold text-yellow-700 bg-yellow-200 px-1.5 py-0.5 rounded">PRÓXIMO</span>}
        {p.started&&!p.done&&<span className="text-xs font-bold text-blue-700 bg-blue-200 px-1.5 py-0.5 rounded">EM ANDAMENTO</span>}
      </div>))}</div></div>
      {/* Painel de filhos para ordens de MONTAGEM */}
      {so.filhos&&so.filhos.length>0&&<div className="border-t">
        <div className="px-3 py-2 bg-purple-50 flex items-center gap-2"><span className="text-xs font-bold text-purple-800 uppercase tracking-wide">🔧 Componentes da Montagem ({so.filhos.length})</span></div>
        <div className="divide-y">{so.filhos.map((f,i)=>{const fo=ordens.find(o=>o.codigo===f.code&&!o.baixa);const allDone=fo&&fo.processos?.length>0&&fo.processos.every(p=>p.done);const hasOpen=fo&&fo.processos?.some(p=>!p.done);return(<div key={i} className={`flex items-center gap-2 px-3 py-1.5 text-xs ${allDone?"bg-green-50":hasOpen?"bg-yellow-50":""}`}><span className={`w-4 h-4 rounded-full flex items-center justify-center text-xs font-bold ${allDone?"bg-green-500 text-white":fo?"bg-yellow-400 text-white":"bg-gray-200 text-gray-500"}`}>{allDone?"✓":fo?"⚙":"?"}</span><span className="font-mono font-bold text-purple-700">{f.code}</span><span className="text-gray-500">Qt:{f.qty}</span>{fo&&<span className="text-gray-400">Ctrl:{fo.controle}</span>}{allDone&&<span className="text-green-600 font-medium">Pronto</span>}{hasOpen&&<span className="text-yellow-600 font-medium">Em processo</span>}{!fo&&<span className="text-gray-400 italic">sem ordem aberta</span>}</div>);})}</div>
      </div>}
      {ci>=0&&<div className="p-3 border-t bg-gray-50"><textarea value={obs} onChange={e=>setObs(e.target.value)} rows={1} className="w-full px-3 py-1.5 border rounded-lg text-sm mb-2" placeholder="Obs (opcional)"/>
        <button onClick={baixa} disabled={lock} className={`w-full py-2.5 rounded-lg font-bold ${lock?"bg-gray-400":"bg-green-600 hover:bg-green-700"} text-white`}>{lock?"⏳...":(`✓ ${so.processos[ci]?.started?"Finalizar":"Iniciar+Finalizar"}: ${so.processos[ci]?.name}`)}</button></div>}

function TimesTab({ordens}){
  const[times,setTimes]=useState(()=>window.__times||[]);useEffect(()=>{const id=setInterval(()=>setTimes([...(window.__times||[])]),3000);return()=>clearInterval(id);},[]);const[filter,setFilter]=useState("");
  const byCode={};times.forEach(t=>{if(!byCode[t.code])byCode[t.code]={};if(!byCode[t.code][t.proc])byCode[t.code][t.proc]=[];byCode[t.code][t.proc].push(t);});
  const rows=[];Object.keys(byCode).sort().forEach(code=>{Object.keys(byCode[code]).forEach(proc=>{const arr=byCode[code][proc];const avg=Math.round(arr.reduce((s,t)=>s+t.dur,0)/arr.length);rows.push({code,proc,avg,min:Math.min(...arr.map(t=>t.dur)),max:Math.max(...arr.map(t=>t.dur)),count:arr.length,last:arr[arr.length-1]});});});
  const filtered=filter?rows.filter(r=>r.code.includes(filter.toUpperCase())||r.proc.toLowerCase().includes(filter.toLowerCase())):rows;
  return(<div className="space-y-3">
    <div className="bg-white rounded-xl border p-3"><div className="flex items-center gap-3"><input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Filtrar..." className="flex-1 px-3 py-1.5 border rounded-lg text-sm"/><span className="text-xs text-gray-500">{times.length} registros</span></div></div>
    <div className="bg-white rounded-xl border overflow-hidden"><div className="font-bold text-gray-700 text-xs px-3 py-2 bg-gray-50 border-b">⏱ Tempos por Peça / Processo</div><div className="overflow-auto max-h-[500px]"><table className="w-full text-sm"><thead className="bg-gray-50 sticky top-0"><tr><th className="px-3 py-2 text-left">Código</th><th className="px-3 py-2 text-left">Desenho</th><th className="px-3 py-2 text-left">Processo</th><th className="px-3 py-2 text-right">Média</th><th className="px-3 py-2 text-right">Min</th><th className="px-3 py-2 text-right">Max</th><th className="px-3 py-2 text-right">N</th><th className="px-3 py-2 text-left">Operador</th></tr></thead>
      <tbody>{!filtered.length?<tr><td colSpan={8} className="py-8 text-center text-gray-400">{times.length?"Sem resultados":"Nenhum tempo registrado."}</td></tr>:filtered.map((r,i)=>(<tr key={i} className={`border-t ${i%2?"bg-gray-50":""}`}><td className="px-3 py-1.5 font-mono font-bold text-xs">{r.code}</td><td className="px-3 py-1.5"><PrintDrawBtn code={r.code}/></td><td className="px-3 py-1.5 text-xs">{r.proc}</td><td className="px-3 py-1.5 text-right font-bold text-blue-700">{fmtDur(r.avg)}</td><td className="px-3 py-1.5 text-right text-xs text-green-600">{fmtDur(r.min)}</td><td className="px-3 py-1.5 text-right text-xs text-red-600">{fmtDur(r.max)}</td><td className="px-3 py-1.5 text-right text-xs">{r.count}</td><td className="px-3 py-1.5 text-xs text-gray-500">{r.last?.op||"—"}</td></tr>))}</tbody></table></div></div>
    {times.length>0&&<button onClick={()=>{const b=new Blob([JSON.stringify(times,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`tempos_${new Date().toISOString().slice(0,10)}.json`;a.click();}} className="px-3 py-1.5 text-sm bg-green-100 text-green-700 rounded-lg font-medium">📊 Exportar JSON</button>}
    {/* Seção de tempos de montagem com filhos */}
    {ordens&&ordens.filter(o=>o.destino==="MONTAGEM"&&o.filhos?.length>0).length>0&&<div className="bg-white rounded-xl border shadow-sm overflow-hidden">
      <div className="p-3 bg-purple-50 border-b font-bold text-purple-800">🔧 Tempos de Montagem — Componentes por Ordem</div>
      <div className="divide-y">{ordens.filter(o=>o.destino==="MONTAGEM"&&o.filhos?.length>0).map((o,i)=>{
        const procsDone=o.processos?.filter(p=>p.done)||[];
        // Tempo de montagem = processos da ordem PAI + tempos dos filhos
        const assemblyDur=procsDone.reduce((s,p)=>s+(p.duration||0),0);
        const filhosDur=(o.filhos||[]).reduce((s,f)=>{const fo=ordens.find(x=>x.codigo===f.code);return s+(fo?.processos?.filter(p=>p.done).reduce((ss,p)=>ss+(p.duration||0),0)||0);},0);
        const totalDur=assemblyDur+filhosDur;
        return(<div key={i} className="p-3">
          <div className="flex items-center gap-3 mb-2">
            <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${o.baixa?"bg-green-100 text-green-800":"bg-yellow-100 text-yellow-800"}`}>{o.baixa?"✓ Concluída":"Em aberto"}</span>
            <span className="font-mono font-bold text-purple-700">{o.codigo}</span>
            <span className="text-xs text-gray-500">Ctrl:{o.controle} · Qt:{o.qtde}</span>
            {totalDur>0&&<span className="text-xs font-bold text-blue-700">⏱ {fmtDur(totalDur)}</span>}
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-1">{o.filhos.map((f,j)=>{const fo=ordens.find(x=>x.codigo===f.code);const fdone=fo?.processos?.filter(p=>p.done)||[];const fdur=fdone.reduce((s,p)=>s+(p.duration||0),0);return(<div key={j} className={`rounded-lg border px-2 py-1.5 text-xs ${fo?.baixa?"border-green-200 bg-green-50":"border-gray-200 bg-gray-50"}`}><div className="font-mono font-bold text-gray-700">{f.code}</div><div className="text-gray-500 mt-0.5">Qt:{f.qty}{fdur>0&&<span className="ml-2 text-blue-600 font-medium">{fmtDur(fdur)}</span>}</div></div>);})}
          </div>
        </div>);
      })}</div>
    </div>}
  </div>);}

// ─── Em Andamento ────────────────────────────────────────────────────────────
function AndamentoTab({ordens,onUpdate}){
  const[now,setNow]=useState(Date.now());
  // Tick a cada 10 segundos para atualizar os tempos ao vivo
  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),10000);return()=>clearInterval(t);},[]);

  // Coleta todos os processos em andamento (started=true, done=false)
  const emAndamento=[];
  ordens.forEach(o=>{
    if(o.baixa)return;
    (o.processos||[]).forEach((p,pi)=>{
      if(p.started&&!p.done){
        const elapsed=p.startTs?now-p.startTs:0;
        emAndamento.push({ordem:o,proc:p,procIdx:pi,elapsed});
      }
    });
  });
  emAndamento.sort((a,b)=>a.proc.startTs-b.proc.startTs);

  // Agrupa pelo nome do processo em execução (não pelo destino da ordem)
  const byDest={};
  emAndamento.forEach(item=>{
    const d=item.proc.name||"OUTROS";
    if(!byDest[d])byDest[d]=[];
    byDest[d].push(item);
  });

  if(!emAndamento.length)return(
    <div className="bg-white rounded-xl border p-12 text-center">
      <div className="text-4xl mb-3">✅</div>
      <p className="text-gray-500 font-medium">Nenhum processo em andamento agora.</p>
      <p className="text-xs text-gray-400 mt-1">Quando um processo for iniciado via bipagem, aparece aqui.</p>
    </div>);

  return(<div className="space-y-4">
    {/* Resumo */}
    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div className="bg-white rounded-xl border p-4 text-center">
        <div className="text-3xl font-bold text-blue-600">{emAndamento.length}</div>
        <div className="text-xs text-gray-500 mt-1">Processos em andamento</div>
      </div>
      <div className="bg-white rounded-xl border p-4 text-center">
        <div className="text-3xl font-bold text-orange-600">{new Set(emAndamento.map(x=>x.ordem.id)).size}</div>
        <div className="text-xs text-gray-500 mt-1">Ordens ativas</div>
      </div>
      <div className="bg-white rounded-xl border p-4 text-center">

function App(){

  const[sel,setSel]=useState(new Set());const[printO,setPrintO]=useState(null);

  const[prev,setPrev]=useState(null);const[prevPri,setPrevPri]=useState("");const[prevMult,setPrevMult]=useState(1);const[prevPedido,setPrevPedido]=useState("");const[prevCliente,setPrevCliente]=useState("");const[prevMaquina,setPrevMaquina]=useState("");const[dbg,setDbg]=useState("");

  },[]);
  const getNC=useCallback(()=>{const ex=new Set(ordens.map(o=>o.controle));let c=nextC;while(ex.has(c))c++;return c;},[ordens,nextC]);

  // ─── handleFile: lê .html ─────────────────────────────────────────────────
  const handleFile=useCallback(async file=>{
    if(!file)return;
    setProc(true);setHtmlErr("");setDbg("");

      const raw=await file.text();
      const extracted=htmlToText(raw);
      let parsed=parseText(extracted);
      // Fallback: strip tags direto
      if(!parsed.items.length){
        parsed=parseText(raw.replace(/<[^>]+>/g," "));
      }
      if(!parsed.items.length){
        const lines=extracted.split("\n").filter(l=>l.trim());
        setDbg(`=== TEXTO EXTRAÍDO (${lines.length} linhas) ===\n${lines.slice(0,40).join("\n")}`);
        setHtmlErr("0 códigos encontrados. Veja o texto extraído abaixo para ajuste.");
        setProc(false);return;
      }
      setPrev({...parsed,_src:file.name});setPrevPedido(parsed.pedido||"");setPrevCliente(parsed.cliente||"");setPrevMaquina(parsed.maquina||"");
    }catch(e){setHtmlErr("Erro ao processar: "+e.message);}
    setProc(false);
  },[]);
  // ─────────────────────────────────────────────────────────────────────────

  const confirmImport=()=>{if(!prev)return;const now=new Date().toLocaleDateString("pt-BR");const pri=String(prevPri||"");
    const atender=[prevPedido,prevCliente].filter(Boolean).join(" - ")||"—";

    const nw=prev.items.map((item,i)=>{while(ex.has(ctrl))ctrl++;const thisC=ctrl;ex.add(thisC);ctrl++;
      let procs=getProcs(item.code).map(p=>({...p,done:false,started:false,startAt:"",startTs:0,doneAt:"",doneTs:0,duration:0,operator:"",obs:""}));
      // Ordens de MONTAGEM: se não tem processos no DB, adiciona etapa "Montagem" para bipagem

      if(item.destino==="MONTAGEM"&&procs.length>0&&!procs.some(p=>p.name==="Montagem")){procs.push({num:String(procs.length+1),name:"Montagem",done:false,started:false,startAt:"",startTs:0,doneAt:"",doneTs:0,duration:0,operator:"",obs:""});}
      const qtdeReal=Math.max(1,Math.round((item.qty||1)*prevMult));
      return{id:Date.now()+i,controle:thisC,dataCriacao:now,dataBaixa:"",baixa:"",prioridade:pri,atender,maquina:prevMaquina||"",codigo:item.code,qtde:qtdeReal,destino:item.destino,processos:procs,filhos:item.filhos.map(f=>({...f,qty:Math.max(1,Math.round((f.qty||1)*prevMult))})),impressa:false,impressaEm:""};});
    nw.forEach(o=>FB.setOrdem(o));FB.setNextC(ctrl);setTab("ordens");setPrev(null);setPrevPri("");setPrevMult(1);setPrevPedido("");setPrevCliente("");setPrevMaquina("");};

  const fl=getF();const st={total:ordens.length,ab:ordens.filter(o=>!o.baixa).length,co:ordens.filter(o=>o.baixa==="X").length};

  const addMan=f=>{const now=new Date().toLocaleDateString("pt-BR");const base=f.codigo.replace(/-\d+$/,"").toUpperCase();const procs=getProcs(base).map(p=>({...p,done:false,started:false,startAt:"",startTs:0,doneAt:"",doneTs:0,duration:0,operator:"",obs:""}));
    let dest;const np=base.replace(/^[A-Z]+/,"");

    else if(np.startsWith("2"))dest="MONTAGEM";
    else if(procs.length)dest=procToDest(procs[0].name);
    else dest=f.destino;
    const ex=new Set(ordens.map(o=>o.controle));let ctrl=nextC;while(ex.has(ctrl))ctrl++;const nova={id:Date.now(),controle:ctrl,dataCriacao:now,dataBaixa:"",baixa:"",prioridade:"",atender:`${f.pedido} ${f.cliente}`.trim(),maquina:f.maquina,codigo:base,qtde:f.qtde,destino:dest,processos:procs,filhos:[],impressa:false,impressaEm:""};FB.setOrdem(nova);FB.setNextC(ctrl+1);};

  const exportData=()=>{const data={ordens,nextControle:nextC,exportDate:new Date().toLocaleString("pt-BR")};const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`ordens_${new Date().toISOString().slice(0,10)}.json`;a.click();};

  const emAndamentoCount=ordens.reduce((s,o)=>s+((o.processos||[]).filter(p=>p.started&&!p.done).length),0);
  if(!fbReady)return(<div className="min-h-screen bg-gray-900 flex items-center justify-center"><div className="text-center text-white"><div className="text-5xl mb-4">🔄</div><div className="text-xl font-bold mb-2">Conectando ao Firebase...</div><div className="text-gray-400 text-sm">Sincronizando dados em tempo real</div></div></div>);
  return(<div className="min-h-screen bg-gray-50">

      <div className="flex items-center gap-3"><img src="https://meitech.com.br/wp-content/themes/meitech/images/svg/logo-white.svg" alt="Meitech" className="h-8 bg-gray-900 rounded px-2 py-1" onError={e=>{e.target.style.display='none'}}/>
        <div><h1 className="text-base font-bold">Controle de Ordens de Produção</h1><p className="text-xs text-gray-500">{st.total} ordens · {st.ab} abertas · {st.co} concluídas · {getDBCount()} processos · <span className="text-green-600 font-medium">🟢 Online</span></p></div></div>

        {!confClear?<button onClick={()=>setConfClear(true)} className="px-2 py-1 text-xs bg-red-50 hover:bg-red-100 rounded text-red-600">🗑️</button>
        :<div className="flex gap-1"><span className="text-xs text-red-600">Apagar?</span><button onClick={clearAll} className="px-2 py-0.5 text-xs bg-red-600 text-white rounded font-bold">Sim</button><button onClick={()=>setConfClear(false)} className="px-2 py-0.5 text-xs bg-gray-200 rounded">Não</button></div>}

        </div>
        <button onClick={()=>{if(mf.codigo){addMan(mf);setMf({...mf,codigo:"",qtde:1});}}} disabled={!mf.codigo} className="mt-3 px-4 py-1.5 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white rounded-lg text-sm font-medium">Criar (Ctrl:{getNC()})</button>
        {mf.codigo&&<div className="mt-2 text-xs text-gray-500">Desenho: <a href={drawUrl(mf.codigo)} target="_blank" className="text-blue-600 hover:underline">{drawUrl(mf.codigo)}</a></div>}
      </div>}

      {tab==="ordens"&&<div className="space-y-2">
        <div className="bg-white rounded-xl border p-2"><div className="flex flex-wrap items-center gap-2">
          <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Buscar..." className="flex-1 min-w-40 px-2 py-1.5 border rounded-lg text-sm"/>
          <select value={fD} onChange={e=>setFD(e.target.value)} className="px-2 py-1.5 border rounded-lg text-sm"><option value="TODOS">Todos Dest.</option>{["SOLDA","USINAGEM","MONTAGEM","CORTE","PINTURA"].map(d=><option key={d}>{d}</option>)}</select>
          <select value={fS} onChange={e=>setFS(e.target.value)} className="px-2 py-1.5 border rounded-lg text-sm"><option value="TODOS">Todos</option><option value="ABERTA">Abertas</option><option value="CONCLUÍDA">Concluídas</option></select>
          {sel.size>0&&<button onClick={()=>{const sels=fl.filter(o=>sel.has(o.id));const css=`@page{size:A4;margin:6mm 8mm;}*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial;color:#000;}.lbl{border:3px solid #000;page-break-inside:avoid;margin-bottom:8mm;}.hdr{background:#000;color:#fff;display:flex;justify-content:space-between;padding:6px 14px;}.hdr h1{font-size:15px;letter-spacing:3px;font-weight:900;}.row{display:flex;border-top:2px solid #000;}.c{padding:4px 8px;border-right:2px solid #000;}.c:last-child{border-right:none;}.cl{font-size:7px;font-weight:800;color:#555;text-transform:uppercase;}.cv{font-size:12px;font-weight:700;margin-top:1px;}.cb{font-size:26px;font-weight:900;}.cm{font-size:16px;font-weight:800;}.bc{border-top:2.5px solid #000;text-align:center;padding:6px 20px;background:#fafafa;}.bct{font-size:10px;font-family:monospace;margin-top:2px;font-weight:700;}.ps{border-top:3px solid #000;}.ph{background:#eee;text-align:center;font-size:8px;font-weight:900;padding:3px;border-bottom:2px solid #000;}.pr{display:flex;align-items:stretch;border-bottom:1.5px solid #000;}.pr:last-child{border-bottom:none;}.pn{width:30px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;border-right:2px solid #000;background:#f5f5f5;}.pm{flex:1;display:flex;align-items:center;padding:4px 10px;font-size:11px;font-weight:700;border-right:2px solid #000;min-height:42px;}.pb{padding:4px 6px;text-align:center;}.pbt{font-size:7px;font-family:monospace;margin-top:1px;}.pk{width:34px;border-left:2px solid #000;display:flex;align-items:center;justify-content:center;}.pkb{width:14px;height:14px;border:2px solid #000;}`;
            const mkL=(o,via)=>{const procs=o.processos||[];const mBC=`OP-${o.controle}`;return`<div class="lbl"><div class="hdr"><div style="display:flex;align-items:center;gap:10px"><img src="https://meitech.com.br/wp-content/themes/meitech/images/svg/logo-white.svg" style="height:18px" onerror="this.style.display='none'"><h1>ORDEM DE PRODUÇÃO</h1></div><span style="font-size:10px;color:#ccc">${via}ª VIA</span></div><div class="row"><div class="c" style="flex:1.2"><div class="cl">Controle</div><div class="cm" style="color:#003d8f">${o.controle}</div></div><div class="c" style="flex:1"><div class="cl">Data</div><div class="cv">${o.dataCriacao}</div></div><div class="c" style="flex:.7"><div class="cl">Prioridade</div><div class="cv" style="color:#b00;font-size:14px">${o.prioridade||"—"}</div></div><div class="c" style="flex:.6"><div class="cl">Qtde</div><div class="cm">${o.qtde}</div></div></div><div class="row"><div class="c" style="flex:1"><div class="cl">Pedido/Cliente</div><div class="cv">${o.atender||"—"}</div></div><div class="c" style="flex:1"><div class="cl">Máquina</div><div class="cv">${o.maquina||"—"}</div></div></div><div class="row"><div class="c" style="flex:1;text-align:center;padding:6px"><div class="cl">Código</div><div class="cb">${o.codigo}</div></div><div class="c" style="flex:.35;text-align:center;padding:6px"><div class="cl">Destino</div><div class="cm">${o.destino}</div></div></div><div class="bc">${bcS(mBC,400,45)}<div class="bct">${mBC}</div></div>${procs.length?`<div class="ps"><div class="ph">PROCESSOS — BIPAGEM</div>${procs.map((p,i)=>{const pbc=`OP-${o.controle}-P${i+1}`;return`<div class="pr"><div class="pn">${i+1}</div><div class="pm">${p.name}</div><div class="pb">${bcS(pbc,280,34)}<div class="pbt">${pbc}</div></div><div class="pk"><div class="pkb"></div></div></div>`;}).join("")}</div>`:""}</div>`;};
            const body=sels.map(o=>`${mkL(o,1)}<div style="border-top:3px dashed #aaa;margin:8px 0"></div>${mkL(o,2)}`).join('<div style="page-break-after:always"></div>');
            const w=window.open("");if(w){w.document.write(`<!DOCTYPE html><html><head><style>${css}</style></head><body>${body}</body></html>`);w.document.close();setTimeout(()=>{w.focus();w.print();},500);markPrintedMany(sels.map(o=>o.id));}}} className="px-2 py-1.5 bg-blue-100 text-blue-700 rounded-lg text-sm font-medium">🖨️ Imprimir ({sel.size})</button>}
          {sel.size>0&&<button onClick={delSel} className="px-2 py-1.5 bg-red-100 text-red-700 rounded-lg text-sm font-medium">Excluir ({sel.size})</button>}
        </div></div>
        <div className="bg-white rounded-xl border overflow-hidden"><div className="overflow-x-auto">
          <table className="w-full text-sm"><thead className="bg-gray-50 sticky top-0"><tr>
            <th className="px-1 py-1.5 w-7"><input type="checkbox" checked={fl.length>0&&sel.size===fl.length} onChange={()=>setSel(sel.size===fl.length?new Set():new Set(fl.map(o=>o.id)))}/></th>
            <th className="px-1 py-1.5 w-16"></th>
            {[["controle","Ctrl"],["codigo","Código"],["qtde","Qt"],["destino","Dest"],["atender","Atender"],["prioridade","Pri"]].map(([k,l])=>(<th key={k} onClick={()=>doSort(k)} className="px-2 py-1.5 text-left text-xs font-medium text-gray-600 cursor-pointer select-none">{l}{sC===k&&(sD==="asc"?"↑":"↓")}</th>))}
            <th className="px-2 py-1.5 text-xs font-medium text-gray-600">Prog</th>
          </tr></thead>
          <tbody>{!fl.length?<tr><td colSpan={9} className="py-8 text-center text-gray-400">Nenhuma ordem.</td></tr>:fl.map(o=>{const pr=gP(o);return(<tr key={o.id} className={`border-t hover:bg-blue-50 ${o.baixa?"bg-green-50/50":""}`}>
            <td className="px-1 py-1"><input type="checkbox" checked={sel.has(o.id)} onChange={()=>togSel(o.id)}/></td>
            <td className="px-1 py-1 flex gap-0.5 items-center"><button onClick={()=>setPrintO(o)} className="hover:scale-110" title="Etiqueta">🏷️</button><button onClick={()=>quickPrint(o,markPrinted)} className="hover:scale-110" title="Imprimir etiqueta">🖨️</button><PrintDrawBtn code={o.codigo}/>{o.impressa&&<span className="text-green-600 text-xs" title={`Impresso: ${o.impressaEm}`}>✅</span>}</td>
            <td className="px-2 py-1 font-mono font-bold text-blue-600 text-xs">{o.controle}</td>
            <td className="px-2 py-1 font-mono text-xs">{o.codigo}</td>
            <td className="px-2 py-1 text-center text-xs">{o.qtde}</td>
            <td className="px-2 py-1"><Badge color={dC(o.destino)}>{o.destino}</Badge></td>
            <td className="px-2 py-1 text-xs max-w-28 truncate" title={o.atender}>{o.atender}</td>
            <td className="px-2 py-1 font-bold text-red-600 text-xs">{o.prioridade||"—"}</td>
            <td className="px-2 py-1">{pr?<div className="flex items-center gap-1"><div className="flex-1 bg-gray-200 rounded-full h-1.5 min-w-12"><div className={`h-1.5 rounded-full ${pr.pct===100?"bg-green-500":"bg-blue-500"}`} style={{width:`${pr.pct}%`}}/></div><span className="text-xs text-gray-400">{pr.done}/{pr.total}</span></div>:<span className="text-xs text-gray-300">—</span>}</td>
          </tr>);})}</tbody></table>
        </div>{fl.length>0&&<div className="px-3 py-1.5 bg-gray-50 border-t text-xs text-gray-500">{fl.length} de {ordens.length}</div>}</div>
      </div>}

      {tab==="andamento"&&<AndamentoTab ordens={ordens} onUpdate={updFull}/>}
      {tab==="group"&&<GroupTab ordens={ordens}/>}
      {tab==="machines"&&<MachineTab ordens={ordens}/>}
      {tab==="times"&&<TimesTab ordens={ordens}/>}
      {tab==="scan"&&<ScanScreen ordens={ordens} onUpdate={updFull}/>}
    </div>
  </div>);}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
